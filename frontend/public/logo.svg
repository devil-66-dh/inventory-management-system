<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#4CAF50" opacity="0.1"/>
  
  <!-- Box/Package shape -->
  <g transform="translate(50, 50)">
    <!-- Top face of box -->
    <polygon points="50,20 70,30 30,30" fill="#4CAF50"/>
    
    <!-- Front face -->
    <rect x="20" y="30" width="60" height="60" fill="#2196F3" stroke="#1976D2" stroke-width="2"/>
    
    <!-- Right face -->
    <polygon points="80,30 100,40 100,100 80,90" fill="#1976D2"/>
    
    <!-- Shelves/Grid pattern inside box -->
    <line x1="20" y1="50" x2="80" y2="50" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="20" y1="70" x2="80" y2="70" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Vertical dividers -->
    <line x1="40" y1="30" x2="40" y2="90" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="60" y1="30" x2="60" y2="90" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Circle overlay with checkmark -->
  <g transform="translate(140, 140)">
    <circle cx="0" cy="0" r="18" fill="#4CAF50"/>
    <polyline points="-6,0 -2,5 8,-6" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Top label -->
  <text x="100" y="180" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">INVENTORY</text>
</svg>
